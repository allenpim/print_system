<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貼紙列印系統</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:#fff;
    margin:0;
    padding:20px;
}

h2{
    text-align:center;
}

.list{
    max-width:600px;
    margin:auto;
}

.item{
    background:#1e1e1e;
    padding:12px;
    margin:10px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:8px;
}

button{
    background:#4f46e5;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#4338ca;
}

/* 列印區 */
#printBox{
    display:none;
}

/* ========================= */
/* 列印設定 */
/* ========================= */
@media print{

    @page{
        size:33mm 14mm;
        margin:0;
    }

    body{
        margin:0;
        padding:0;
        background:#fff;
    }

    body *{
        visibility:hidden;
    }

    #printBox,
    #printBox *{
        visibility:visible;
    }

    #printBox{
        display:block !important;

        position:absolute;
        left:0;
        top:0;

        width:33mm;
        height:14mm;

        box-sizing:border-box;

        padding:1mm;

        background:#fff;
        color:#000;

        overflow:hidden;

        font-size:8pt;
        line-height:1.1;
    }

    .name{
        font-weight:bold;
        font-size:9pt;
        margin-bottom:0.5mm;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .date{
        font-size:7pt;
    }
}
</style>
</head>

<body>

<h2>貼紙列印系統</h2>

<div class="list">

    <div class="item">
        <span>臺灣綠檸檬汁</span>
        <button onclick="printItem('臺灣綠檸檬汁',7)">列印</button>
    </div>

    <div class="item">
        <span>檸檬原汁</span>
        <button onclick="printItem('檸檬原汁',6)">列印</button>
    </div>

</div>

<div id="printBox"></div>

<script>

function formatDate(date){
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');

    const h = String(date.getHours()).padStart(2,'0');
    const min = String(date.getMinutes()).padStart(2,'0');

    return `${y}/${m}/${d} ${h}:${min}`;
}

function printItem(name, days){

    const start = new Date();

    const end = new Date();
    end.setDate(end.getDate() + days);

    document.getElementById("printBox").innerHTML = `
        <div class="name">${name}</div>
        <div class="date">開封：${formatDate(start)}</div>
        <div class="date">有效：${formatDate(end)}</div>
    `;

    setTimeout(() => {
        window.print();
    }, 200);
}

</script>

</body>
</html>
