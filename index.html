<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sticker Print</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.item {
    margin: 10px 0;
}

button {
    padding: 8px 12px;
}

/* 平常不要顯示 */
#printBox {
    display: none;
}

@media print {

    @page {
        size: 35mm 25mm;
        margin: 0;
    }

    body > * {
        display: none;
    }

    #printBox {
        display: block !important;

        position: fixed;
        left: 0;
        top: 0;

        width: 35mm;
        height: 25mm;

        box-sizing: border-box;
        padding: 2mm;

        background: white !important;
        color: black !important;

        font-size: 10pt;
        line-height: 1.3;
        overflow: hidden;
    }
}
</style>
</head>

<body>

<h2>貼紙列印系統</h2>

<div class="item">
    臺灣綠檸檬汁
    <button onclick="printItem('臺灣綠檸檬汁',7)">列印</button>
</div>

<div class="item">
    檸檬原汁
    <button onclick="printItem('檸檬原汁',6)">列印</button>
</div>

<div id="printBox"></div>

<script>
function formatDate(date){
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return `${y}/${m}/${d}`;
}

function printItem(name, days){

    const start = new Date();

    const end = new Date();
    end.setDate(end.getDate() + days);

    document.getElementById("printBox").innerHTML = `
        <div>
            <strong>${name}</strong><br>
            開封：${formatDate(start)}<br>
            有效：${formatDate(end)}
        </div>
    `;

    setTimeout(() => {
        window.print();
    }, 300);
}
</script>

</body>
</html>
