<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sticker Print</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
  padding: 20px;
}

h2 {
  text-align: center;
}

.list {
  max-width: 600px;
  margin: auto;
}

.item {
  background: #1e1e1e;
  padding: 12px;
  margin: 10px 0;
  display: flex;
  justify-content: space-between;
}

button {
  background: #4f46e5;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
}

/* modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 10px;
  width: 280px;
}

.modal-content input {
  width: 100%;
  padding: 8px;
  margin-top: 10px;
}

.actions {
  margin-top: 15px;
  display: flex;
  justify-content: space-between;
}

/* ⭐ print only sticker */
@media print {
  @page {
    size: 35mm 25mm;
    margin: 0;
  }

  body * {
    visibility: hidden;
  }

  #printBox {
    visibility: visible;
    position: absolute;
    left: 0;
    top: 0;
    width: 35mm;
    height: 25mm;
    padding: 2mm;
    font-size: 8px;
  }
}
</style>
</head>

<body>

<h2>貼紙列印系統</h2>

<div class="list">
  <div class="item">
    咖啡豆 A
    <button onclick="openModal('咖啡豆 A')">列印</button>
  </div>

  <div class="item">
    咖啡豆 B
    <button onclick="openModal('咖啡豆 B')">列印</button>
  </div>
</div>

<!-- modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>選擇日期</h3>

    <input type="date" id="dateInput"/>

    <div class="actions">
      <button onclick="closeModal()">取消</button>
      <button onclick="confirmPrint()">確認列印</button>
    </div>
  </div>
</div>

<!-- print area -->
<div id="printBox"></div>

<script>

let selectedItem = null;

function openModal(name) {
  selectedItem = name;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("dateInput").value = "";
  selectedItem = null;
}

function confirmPrint() {
  const date = document.getElementById("dateInput").value;

  if (!date) {
    alert("請選日期");
    return;
  }

  const box = document.getElementById("printBox");

  box.innerHTML = `
    <div>
      <b>${selectedItem}</b><br/>
      ${date}
    </div>
  `;

  window.print();

  closeModal();
}

</script>

</body>
</html>
