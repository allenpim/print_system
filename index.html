<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>QZ Test</title>
</head>
<body>

<button onclick="check()">測試 QZ Tray</button>

<script>
function checkQZTray() {
    return new Promise((resolve) => {

        if (!window.qz) {
            resolve(false);
            return;
        }

        qz.websocket.connect()
            .then(() => resolve(true))
            .catch(() => resolve(false));
    });
}

function check() {
    checkQZTray().then(hasQZ => {
        alert(hasQZ ? "有 QZ Tray" : "沒有 QZ Tray");
    });
}
</script>

</body>
</html>
