<!DOCTYPE html>

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h2 {
    text-align: center;
}

.list {
    max-width: 600px;
    margin: auto;
}

.item {
    background: #1e1e1e;
    padding: 12px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 8px;
}

button {
    background: #4f46e5;
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #4338ca;
}

/* 隱藏列印區 */
#printBox {
    display: none;
}

/* 列印設定 */
@media print {

@page {
    size: 35mm 25mm;
    margin: 0;
}

body * {
    visibility: hidden;
}

body > *:not(#printBox) {
     display: none !important;
   }

#printBox, #printBox * {
    visibility: visible;
}

#printBox {
    display: flex !important;
    flex-direction: column;
    position: fixed;
    top: 10mm;
    left: 1mm;
    width: 35mm;
    height: 35mm;
    padding: 1.5mm;
    box-sizing: border-box;
    background: #fff;
    color: #000;
    overflow: hidden;
    font-family: Arial;
    line-height: 1.2;
    transform: none !important;
}

.title {
    font-size: 8pt;
    font-weight: bold;
    margin-bottom: 1mm;
}

.strtimetitle {
    font-size: 5pt;
}

.endtimetitle {
     margin-top: 2pt;
    font-size: 5pt;
}

.time {
    margin-top: 2pt;
    font-size: 5pt;
}

}
</style>
</head>

<body>

<h2>效期標籤貼紙列印</h2>

<div id="list"></div>
<div id="printBox"></div>

<script>
let dataList = [];

/* 本機測試讀 Excel */

/* github讀 Excel */
async function loadExcel(){

    const res = await fetch("./data.xlsx");
    const buffer = await res.arrayBuffer();

    const workbook = XLSX.read(buffer, {type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    dataList = XLSX.utils.sheet_to_json(sheet);

    renderList();
}

/* 顯示清單 */
function renderList(){

    const list = document.getElementById("list");
    list.innerHTML = "";

    dataList.forEach((item, i) => {

        list.innerHTML += `
            <div class="item">
                <div>${item.item}</div>
                <button onclick="printItem(${i})">列印</button>
            </div>
        `;
    });
}

/* 時間 */
/*function formatDate(date){
    const y = date.getFullYear();

function formatDate(date){
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    const h = String(date.getHours()).padStart(2,'0');
    const min = String(date.getMinutes()).padStart(2,'0');
    return `${y}/${m}/${d}`;
}

function formatTime(date){
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    const h = String(date.getHours()).padStart(2,'0');
    const min = String(date.getMinutes()).padStart(2,'0');
    return `${h}:${min}`;
}


/*function calcExpiry(start, days, hours){
    const end = new Date(start);
    end.setDate(end.getDate() + Number(days || 0));
    end.setHours(end.getHours() + Number(hours || 0));
    return end;
}*/

function calcExpiry(start, days){
    const end = new Date(start);
    end.setDate(end.getDate() + Number(days || 0));
    return end;
}

function calcExpiry2(start, hours){
    const end = new Date(start);
    end.setHours(end.getHours() + Number(hours || 0));
    return end;
}

/* 自動縮字 */
function autoFitText(el, max = 5, min = 2){

    const text = el.textContent || "";
    
    // 不超過 6 個字 → 不處理
    if (text.length <= 6) return;

    let size = max;
    el.style.fontSize = size + "pt";

    while(el.scrollWidth > el.clientWidth && size > min){
        size -= 0.5;
        el.style.fontSize = size + "pt";
    }
}

/* 列印 */
function printItem(i){

    const item = dataList[i];

    const start = new Date();
    const end = calcExpiry(start, item.days);
    const end2 = calcExpiry2(start, item.hours);

    const box = document.getElementById("printBox");

    box.innerHTML = `
        <div class="title">${item.item}</div>
        <div class="strtimetitle">開封時間</div>
        <div class="time">${formatDate(start)}</div>
    <div class="time">${formatTime(start)}</div>
        <div class="endtimetitle">有效期限</div>
        <div class="time">${formatDate(end)}</div>
    <div class="time">${formatTime(end2)}</div>
    `;

    const title = box.querySelector(".title");
    autoFitText(title);

    setTimeout(() => {
        window.print();
    }, 200);
}

/* 啟動 */
window.addEventListener("load", loadExcel);

</script>
