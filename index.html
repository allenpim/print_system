<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>效期標籤列印</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

h2 {
    text-align: center;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin: 6px 0;
    background: #eee;
    border-radius: 6px;
}

button {
    padding: 5px 10px;
    cursor: pointer;
}

/* ===== 列印區 ===== */
#printBox {
    display: none;
}

/* ===== PRINT SETTING ===== */
@media print {

@page {
    size: 35mm 25mm;
    margin: 0;
}

body * {
    visibility: hidden;
}

#printBox, #printBox * {
    visibility: visible;
}

#printBox {
    position: fixed;
    top: 12mm;
    left: 1mm;

    width: 35mm;
    height: 25mm;

    padding: 1mm;
    box-sizing: border-box;

    background: #fff;
    color: #000;

    font-size: 7pt;
    line-height: 1;
    overflow: hidden;
}

.title {
    font-weight: bold;
    font-size: 8pt;

    white-space: nowrap;
    overflow: hidden;
}
}
</style>
</head>

<body>

<h2>效期標籤列印</h2>

<div id="list"></div>

<div id="printBox"></div>

<script>

let dataList = [];

/* =========================
   讀 Excel（GitHub Pages用）
========================= */
async function loadExcel(){

    const res = await fetch("./data.xlsx");
    const buffer = await res.arrayBuffer();

    const workbook = XLSX.read(buffer, {type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    dataList = XLSX.utils.sheet_to_json(sheet);

    renderList();
}

/* =========================
   顯示清單
========================= */
function renderList(){

    const list = document.getElementById("list");
    list.innerHTML = "";

    dataList.forEach((item, i) => {

        list.innerHTML += `
            <div class="item">
                <div>${item.item}</div>
                <button onclick="printItem(${i})">列印</button>
            </div>
        `;
    });
}

/* =========================
   時間格式：YYYY/MM/DD HH時
========================= */
function formatDate(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const h = String(d.getHours()).padStart(2,'0');

    return `${y}/${m}/${dd} ${h}時`;
}

/* =========================
   時間計算
========================= */
function calcExpiry(start, days, hours){

    const end = new Date(start);

    end.setDate(end.getDate() + Number(days || 0));
    end.setHours(end.getHours() + Number(hours || 0));

    return end;
}

/* =========================
    自動縮字
========================= */
function autoFitText(el, max = 8, min = 5){

    let size = max;
    el.style.fontSize = size + "pt";

    while(el.scrollWidth > el.clientWidth && size > min){
        size -= 0.5;
        el.style.fontSize = size + "pt";
    }
}

/* =========================
   列印
========================= */
function printItem(i){

    const item = dataList[i];

    const start = new Date();
    const end = calcExpiry(start, item.days, item.hours);

    const box = document.getElementById("printBox");

    box.innerHTML = `
        <div class="title">${item.item}</div>
        <div>開封 ${formatDate(start)}</div>
        <div>有效 ${formatDate(end)}</div>
    `;

    // 縮字
    const title = box.querySelector(".title");
    autoFitText(title);

    setTimeout(() => {
        window.print();
    }, 200);
}

/* 啟動 */
loadExcel();

</script>

</body>
</html>
