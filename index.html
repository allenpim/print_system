<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>Label Print</title>

<style>
/* =========================
   PRINT SETUP (核心)
========================= */
@page {
  size: 50.8mm 101.6mm;
  margin: 0;
}

html, body {
  margin: 0;
  padding: 0;
  width: 50.8mm;
  height: 101.6mm;
  font-family: Arial, "Noto Sans TC", sans-serif;
}

/* Chrome print reset */
* {
  box-sizing: border-box;
}

/* =========================
   LABEL CONTAINER
========================= */
.label {
  width: 50.8mm;
  height: 101.6mm;
  padding: 2.5mm;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* =========================
   HEADER
========================= */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.title {
  font-size: 10px;
  font-weight: bold;
  line-height: 1.2;
}

.subtitle {
  font-size: 8px;
  color: #333;
}

/* =========================
   ITEM BLOCK
========================= */
.item-box {
  margin-top: 2mm;
  flex: 1;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  margin-bottom: 1.2mm;
}

.label-text {
  font-weight: bold;
}

/* =========================
   QR + BARCODE AREA
========================= */
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 2mm;
}

.qr {
  width: 18mm;
  height: 18mm;
}

.barcode {
  width: 28mm;
  height: 10mm;
}

/* fallback box if generator not loaded */
.box {
  border: 1px solid #000;
}

/* =========================
   DEBUG (可關掉)
========================= */
/*
.label { border: 1px solid red; }
*/
</style>
</head>

<body>

<div class="label">

  <!-- HEADER -->
  <div>
    <div class="header">
      <div>
        <div class="title">COFFEE ORDER</div>
        <div class="subtitle">No: A102938</div>
      </div>
      <div class="subtitle">2026-06-19</div>
    </div>

    <!-- ITEM -->
    <div class="item-box">
      <div class="row">
        <span class="label-text">品項</span>
        <span>拿鐵咖啡</span>
      </div>

      <div class="row">
        <span class="label-text">冰熱</span>
        <span>熱</span>
      </div>

      <div class="row">
        <span class="label-text">甜度</span>
        <span>正常</span>
      </div>

      <div class="row">
        <span class="label-text">數量</span>
        <span>1</span>
      </div>
    </div>
  </div>

  <!-- QR + BARCODE -->
  <div class="bottom">

    <!-- QR (放 canvas / img) -->
    <div>
      <img class="qr box"
           src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=ORDER_A102938" />
    </div>

    <!-- BARCODE (用 barcode library 或 image) -->
    <div>
      <img class="barcode box"
           src="https://barcode.tec-it.com/barcode.ashx?data=A102938&code=Code128&dpi=96" />
    </div>

  </div>

</div>

</body>
</html>
