<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貼紙列印系統</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:#fff;
    margin:0;
    padding:20px;
}

h2{
    text-align:center;
}

.list{
    max-width:600px;
    margin:auto;
}

.item{
    background:#1e1e1e;
    padding:12px;
    margin:10px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-radius:8px;
}

button{
    background:#4f46e5;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#4338ca;
}

/* 預設隱藏列印區 */
#printBox{
    display:none;
}

/* ===================== */
/* 列印專用 */
/* ===================== */
@media print{

    @page{
        size:35mm 25mm;
        margin:0;
    }

    html,
    body{
        margin:0;
        padding:0;
        width:35mm;
        height:25mm;
        overflow:hidden;
        background:#fff;
    }

    /* 隱藏網站內容 */
    h2,
    .list{
        display:none !important;
    }

    /* 顯示貼紙 */
    #printBox{
        display:block !important;

        position:fixed;
        left:0;
        top:0;

        width:35mm;
        height:25mm;

        box-sizing:border-box;
        padding:2mm;

        background:#fff;
        color:#000;

        overflow:hidden;
    }

    .name{
        font-size:12px;
        font-weight:bold;
        margin-bottom:2px;

        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
    }

    .date{
        font-size:9px;
        line-height:1.3;
    }
}

</style>
</head>

<body>

<h2>貼紙列印系統</h2>

<div class="list">

    <div class="item">
        <span>臺灣綠檸檬汁</span>
        <button onclick="printItem('臺灣綠檸檬汁',7)">
            列印
        </button>
    </div>

    <div class="item">
        <span>檸檬原汁</span>
        <button onclick="printItem('檸檬原汁',6)">
            列印
        </button>
    </div>

</div>

<div id="printBox"></div>

<script>

function formatDate(date){
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');

    return `${y}/${m}/${d}`;
}

function printItem(name, days){

    const start = new Date();

    const end = new Date();
    end.setDate(end.getDate() + days);

    document.getElementById("printBox").innerHTML = `
        <div class="name">${name}</div>
        <div class="date">開封：${formatDate(start)}</div>
        <div class="date">有效：${formatDate(end)}</div>
    `;

    setTimeout(() => {
        window.print();
    }, 100);
}

</script>

</body>
</html>
