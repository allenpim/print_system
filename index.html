<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sticker Print</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
  padding: 20px;
}
h2 {
  text-align: center;
}
.list {
  max-width: 600px;
  margin: auto;
}
.item {
  background: #1e1e1e;
  padding: 12px;
  margin: 10px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
button {
  background: #4f46e5;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}
/* ⭐ print only sticker */
@media print {
  @page {
    size: 35mm 25mm;
    margin: 0;
  }
  body * {
    visibility: hidden;
  }
  #printBox {
    visibility: visible;
    position: absolute;
    left: 0;
    top: 0;
    width: 35mm;
    height: 25mm;
    padding: 2mm;
    font-size: 8px;
  }
}
</style>
</head>
<body>
<h2>貼紙列印系統</h2>
<div class="list">
  <div class="item">
    臺灣綠檸檬汁
    <button onclick="printItem('臺灣綠檸檬汁', 7)">列印</button>
  </div>
  <div class="item">
    檸檬原汁
    <button onclick="printItem('檸檬原汁', 6)">列印</button>
  </div>
</div>

<!-- print area -->
<div id="printBox"></div>

<script>
function formatDate(d) {
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
}

function printItem(name, days) {
  const start = new Date();
  const end = new Date();
  end.setDate(end.getDate() + days);

  const startStr = formatDate(start);
  const endStr = formatDate(end);

  const box = document.getElementById("printBox");
  box.innerHTML = `
    <div>
      <b>${name}</b><br/>
      ${startStr}～${endStr}
    </div>
  `;
  window.print();
}
</script>
</body>
</html>
